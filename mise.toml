[settings]
experimental = true
lockfile = true
cargo.binstall = true

[tools]
goreleaser = "2.15.4"
rust = "latest"
rust-analyzer = "latest"
sccache = "latest"
zig = "latest"
"cargo:clippy-sarif" = "latest"
"cargo:sarif-fmt" = "latest"
"cargo:cargo-nextest" = "latest"

[tasks.lint]
description = "Run formatting and clippy checks"
run = "bash -o pipefail -c 'cargo fmt --check && cargo clippy --all-targets --all-features --locked --message-format=json -- -D warnings | clippy-sarif | tee clippy.sarif | sarif-fmt'"
